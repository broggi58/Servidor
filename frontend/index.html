<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4 shadow" style="width: 360px;">
    <h3 class="text-center mb-3">Login</h3>

    <form id="loginForm">
      
      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" id="password" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Ingresar</button>
      <a href="register.html" class="d-block text-center mt-2">Ir a registro</a>
    </form>
  </div>

  <script>
    const API_URL = 'http://localhost:3000';
    
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      
      // Validar que los campos no estén vacíos
      if (!email || !password) {
        alert("Por favor, complete todos los campos");
        return;
      }
      
      console.log('Email enviado:', email);
      console.log('Password enviada:', password ? '***' : 'vacía');
      console.log('URL completa:', `${API_URL}/auth/login`);
      
      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });
        
        console.log('📡 Status:', response.status);
        
        // LEER LA RESPUESTA PRIMERO
        const data = await response.json();
        console.log('📨 Respuesta completa:', data);
        
        if (response.ok) {
          // VERIFICAR QUE EXISTA EL TOKEN
          if (data.token) {
            localStorage.setItem('token', data.token);
            alert("Login exitoso");
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 2000);
          } else {
            alert("No se recibió token de autenticación");
          }
        } else {
          // ERROR DEL SERVIDOR (401, 400, etc.)
          alert("" + (data.error || "Credenciales inválidas"));
        }
        
      } catch (error) {
        console.error('Error de conexión:', error);
        alert("Error de conexión con el servidor. ¿El servidor está corriendo?");
      }
    });
  </script>
</body>
</html>
